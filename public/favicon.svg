<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"></rect>

  <!-- M -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="48" font-family="Arial, sans-serif" font-weight="bold" fill="url(#grad)">
    MK
  </text>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"></stop>
      <stop offset="100%" stop-color="#22d3ee"></stop>
    </linearGradient>
  </defs>

</svg>